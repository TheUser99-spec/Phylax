[project]
name = "AgentGuard"
default = "conservative"

[deny]
files = [
    ".agentguard.toml",
    "./agentguard.toml",
    "**/*.key",
    "**/*.p12",
    "**/*.pem",
    "**/*.pfx",
    ".env",
    ".env.*",
    ".git/**",
]

[ask]
files = ["Cargo.lock"]

[full]
files = []

[delete]
files = [
    "*.log",
    "target/**",
    "tmp/**",
]

[write]
files = ["Cargo.toml"]

[read]
files = [
    ".gitignore",
    "README.md",
    "docs/**",
]
